name: CI

on:
  push:
    branches:
      - '**'
  pull_request:

jobs:
  test-and-build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [18, 20]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Run build
        run: npm run build

      - name: Verify CLI runs
        run: node src/index.js --version

      - name: Verify packaged CLI works via global install
        run: |
          npm pack
          npm install -g ./unirepo-cli-*.tgz
          unirepo --version
          unirepo --help
